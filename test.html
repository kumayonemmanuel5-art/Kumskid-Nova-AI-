<!DOCTYPE html>
<html>
<body>
<button onclick="test()">Test Bot</button>
<div id="result" style="margin-top:20px; font-size:16px;"></div>
<script>
async function test() {
  document.getElementById('result').textContent = 'Testing...';
  try {
    const response = await fetch('/groq', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama3-8b-8192',
        max_tokens: 100,
        messages: [{ role: 'user', content: 'Say hello in one word' }]
      })
    });
    const text = await response.text();
    document.getElementById('result').textContent = 'Response: ' + text;
  } catch(e) {
    document.getElementById('result').textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
